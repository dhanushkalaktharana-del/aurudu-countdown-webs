<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 11 iOS 26 Mirror Concept</title>
    
    <style>
        :root {
            --mirror-bg: rgba(255, 255, 255, 0.4); 
            --glass-border: rgba(255, 255, 255, 0.7);
            --mirror-gradient: linear-gradient(135deg, #ff0080, #7928ca, #ff0080, #0070f3);
            --hover-bg: rgba(255, 255, 255, 0.55);
        }

        body {
            margin: 0; padding: 0; background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow-x: hidden; min-height: 100vh;
        }

        /* iOS 26 Mesh Background */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #a1c4fd, #fbc2eb);
            background-size: 400% 400%;
            animation: gradMove 12s ease infinite;
            filter: blur(50px) brightness(0.95);
        }
        @keyframes gradMove { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        /* Falling Items */
        .falling-item {
            position: absolute; color: rgba(255, 255, 255, 0.6);
            animation: fall infinite linear; font-size: 26px; z-index: -1;
        }
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 0; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* --- UPGRADED DYNAMIC ISLAND --- */
        .dynamic-island {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); color: #fff; padding: 12px 30px; 
            border-radius: 30px; z-index: 1000; font-size: 0.9rem; font-weight: 600;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .dynamic-island:hover {
            transform: translateX(-50%) scale(1.1);
            background: #000; padding: 15px 45px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .container { display: flex; flex-direction: column; align-items: center; padding: 120px 20px 60px; position: relative; z-index: 10; }

        /* THE MAIN CARD */
        .card {
            background: var(--mirror-bg);
            backdrop-filter: blur(70px) saturate(250%);
            -webkit-backdrop-filter: blur(70px) saturate(250%);
            padding: 55px 40px; border-radius: 60px;
            box-shadow: 0 50px 120px rgba(0,0,0,0.1), inset 0 0 40px rgba(255,255,255,0.4);
            text-align: center; max-width: 550px; width: 100%;
            border: 1.8px solid var(--glass-border);
            box-sizing: border-box;
        }

        /* --- MIRROR BOX (Sun/Moon) --- */
        .sun-moon-box {
            width: 180px; height: 180px; margin: 0 auto 30px;
            border-radius: 50px; background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(30px); border: 2.5px solid #fff;
            display: flex; align-items: center; justify-content: center;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); cursor: pointer;
        }
        .sun-moon-box:hover { transform: scale(1.1) rotate(5deg); background: var(--hover-bg); }
        .celestial-content { font-size: 85px; }

        .mirror-text {
            font-weight: 900; font-size: 3.2rem; letter-spacing: -2px; margin: 0;
            background: var(--mirror-gradient); background-size: 300% 300%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: mirrorShimmer 6s linear infinite;
        }

        /* --- UPGRADED MIRROR TIMER BOX --- */
        #timer { 
            background: rgba(255, 255, 255, 0.35); padding: 25px; border-radius: 35px; 
            font-weight: 900; font-size: 2.2rem; margin: 30px 0; 
            border: 2px solid var(--glass-border);
            backdrop-filter: blur(20px);
            background-image: var(--mirror-gradient); background-size: 300% 300%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: mirrorShimmer 6s linear infinite;
            transition: 0.5s; cursor: pointer;
        }
        #timer:hover { transform: scale(1.05); background-color: var(--hover-bg); border-color: #fff; }

        /* --- UPGRADED MIRROR DETAILS BOX --- */
        .event-details { 
            background: rgba(255, 255, 255, 0.3); padding: 30px; border-radius: 40px; 
            margin: 25px 0; text-align: left; border: 2px solid var(--glass-border);
            backdrop-filter: blur(20px); transition: 0.5s; cursor: pointer;
        }
        .event-details:hover { transform: scale(1.03); background: var(--hover-bg); border-color: #fff; }

        @keyframes mirrorShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .events-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .event-item { 
            background: rgba(255, 255, 255, 0.4); padding: 12px; border-radius: 30px; 
            border: 1.5px solid var(--glass-border); transition: 0.4s;
        }
        .event-item:hover { transform: translateY(-5px); background: var(--hover-bg); }
        .event-item img { width: 100%; border-radius: 22px; height: 110px; object-fit: cover; }

        .form input, .form select { 
            width: 100%; padding: 22px; margin: 15px 0; border-radius: 25px; 
            border: 1.5px solid rgba(255,255,255,0.4); background: rgba(255, 255, 255, 0.25); 
            box-sizing: border-box; font-size: 1.1rem; outline: none; transition: 0.3s;
        }
        .form input:focus { background: rgba(255, 255, 255, 0.45); border-color: #fff; }
        
        .btn { 
            background: #000; color: #fff; padding: 22px; border-radius: 25px; 
            font-weight: 700; border: none; cursor: pointer; width: 100%; 
            font-size: 1.3rem; margin-top: 20px; transition: 0.4s;
        }
        .btn:hover { background: #333; transform: scale(1.02); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }

        footer { margin-top: 50px; font-size: 1rem; color: rgba(0,0,0,0.5); font-weight: 600; }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>
    <div id="rain-container"></div>

    <div class="dynamic-island" id="island-text">Suriya Mangalyaya</div>

    <div class="container">
        <div class="card">
            
            <div class="sun-moon-box">
                <div class="celestial-content">🌞<br>🌜</div>
            </div>

            <h1 class="mirror-text">සූරිය මංගල්‍යය</h1>
            <p style="font-weight: 700; opacity: 0.8; font-size: 1.2rem; color: #333; margin-top: 5px;">Grade 11 Annual Festival</p>

            <div id="timer">00d 00h 00m 00s</div>
            
            <div class="event-details">
                <p>📅 <strong>දිනය:</strong> 2026 අප්‍රේල් 18</p>
                <p>📍 <strong>ස්ථානය:</strong> පාසල් ක්‍රීඩාංගණය</p>
            </div>

            <div class="events-grid">
                <div class="event-item">
                    <img src="https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?auto=format&fit=crop&w=300" alt="Games">
                    <p style="font-weight: 700; font-size: 0.95rem; margin-top: 8px;">පැණි බඹරේ</p>
                </div>
                <div class="event-item">
                    <img src="https://images.unsplash.com/photo-1517457373958-b7bdd4587205?auto=format&fit=crop&w=300" alt="Tug of War">
                    <p style="font-weight: 700; font-size: 0.95rem; margin-top: 8px;">කඹ ඇදීම</p>
                </div>
            </div>

            <div class="form">
                <input type="text" id="name" placeholder="ඔබේ නම">
                <select id="class">
                    <option value="" disabled selected>පන්තිය තෝරන්න</option>
                    <option>11-A</option><option>11-B</option><option>11-C</option><option>11-D</option>
                </select>
                <input type="tel" id="phone" placeholder="දුරකථන අංකය">
                <button class="btn">Register Now</button>
            </div>
            
            <footer>Dhanushka Laktharana | Dhanu Editz</footer>
        </div>
    </div>

    <script>
        const rain = document.getElementById('rain-container');
        const symbols = ['🌞', '🌙', '🌸', '🍪', '✨'];
        for (let i = 0; i < 40; i++) {
            const el = document.createElement('div');
            el.className = 'falling-item';
            el.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (Math.random() * 8 + 6) + 's';
            el.style.animationDelay = Math.random() * 6 + 's';
            rain.appendChild(el);
        }

        const targetDate = new Date(2026, 3, 18, 14, 0, 0).getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff < 0) { document.getElementById("timer").innerHTML = "සුබ අලුත් අවුරුද්දක් වේවා! 🌸"; return; }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            const res = `${d}d ${h}h ${m}m ${s}s`;
            document.getElementById("timer").innerHTML = res;
            document.getElementById("island-text").innerHTML = "Starts in: " + res;
        }, 1000);
    </script>
</body>
</html>
