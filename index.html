<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 11 iOS 26 Premium Invitation</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    
    <style>
        :root {
            --ios-red: #ff3b30;
            --ios-orange: #ff9500;
            --ios-bg: rgba(255, 255, 255, 0.75);
            --card-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        body {
            margin: 0; padding: 0; 
            background: #000; /* Darker base for premium feel */
            background-image: 
                radial-gradient(at 0% 0%, hsla(28,100%,74%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(189,100%,56%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(355,100%,93%,1) 0, transparent 50%);
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            color: #1d1d1f; overflow-x: hidden;
            min-height: 100vh;
        }

        /* iOS style Smooth Floating Particles */
        .particle {
            position: fixed; background: rgba(255, 255, 255, 0.4);
            border-radius: 50%; pointer-events: none; z-index: 1;
            animation: float 20s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .container { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 40px 20px; position: relative; z-index: 10;
        }

        /* iOS 26 Glassmorphism Card */
        .card {
            background: var(--ios-bg); 
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 40px; border-radius: 35px;
            box-shadow: var(--card-shadow); 
            text-align: center; max-width: 500px; width: 100%;
            border: 1px solid rgba(255,255,255,0.4);
            animation: iosReveal 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes iosReveal {
            from { opacity: 0; transform: scale(0.9) translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        h1 { 
            font-weight: 700; font-size: 2.2rem; letter-spacing: -0.5px;
            background: linear-gradient(180deg, #1d1d1f 0%, #434345 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        #timer { 
            background: rgba(0, 0, 0, 0.05);
            padding: 15px; border-radius: 20px; 
            font-weight: 600; font-size: 1.3rem; margin: 20px 0;
            color: var(--ios-red); display: block;
        }

        .event-details { 
            background: rgba(255, 255, 255, 0.4); padding: 20px; 
            border-radius: 22px; margin: 20px 0; border: 1px solid rgba(0,0,0,0.05);
            text-align: left;
        }

        /* iOS Grid Style */
        .events-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px;
        }
        .event-item {
            background: rgba(255, 255, 255, 0.5); padding: 8px; border-radius: 24px; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .event-item:hover { 
            transform: scale(1.05); background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }
        .event-item img { width: 100%; border-radius: 18px; height: 100px; object-fit: cover; }
        .event-item p { font-weight: 600; margin: 10px 0 5px 0; font-size: 0.9rem; }

        /* Input Styling - SF Pro Look */
        .reg-form { margin-top: 30px; }
        .reg-form input, .reg-form select { 
            width: 100%; padding: 14px 18px; margin: 8px 0; 
            border-radius: 16px; border: none; 
            background: rgba(0, 0, 0, 0.04);
            box-sizing: border-box; outline: none; 
            font-size: 1rem; transition: 0.3s;
        }
        .reg-form input:focus { background: rgba(0, 0, 0, 0.08); }
        
        /* iOS Interactive Button */
        .btn { 
            background: #007aff; /* Apple Blue */
            color: white; padding: 16px; border-radius: 18px; 
            font-weight: 600; border: none; cursor: pointer; width: 100%; 
            font-size: 1.1rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 15px;
        }
        .btn:hover { background: #0063cc; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,122,255,0.3); }
        .btn:active { transform: scale(0.96); } /* Bounce effect on click */

        footer { margin-top: 30px; font-size: 0.8rem; color: rgba(0,0,0,0.4); font-weight: 500; }
    </style>
</head>
<body>

    <div id="particles"></div>

    <div class="container">
        <div class="card">
            <lottie-player src="https://assets8.lottiefiles.com/private_files/lf30_m6j5ig30.json"  
                background="transparent" speed="0.8" style="width: 120px; height: 120px; margin: 0 auto;" loop autoplay>
            </lottie-player>

            <h1>සූරිය මංගල්‍යය</h1>
            <p style="color: #6e6e73; font-weight: 500;">Grade 11 Annual Festival</p>

            <div id="timer">Loading...</div>
            
            <div class="event-details">
                <p style="margin: 5px 0;">📅 <strong>දිනය:</strong> 2026 අප්‍රේල් 18</p>
                <p style="margin: 5px 0;">⏰ <strong>වේලාව:</strong> ප.ව. 2:00 සිට</p>
                <p style="margin: 5px 0;">📍 <strong>ස්ථානය:</strong> පාසල් ක්‍රීඩාංගණය</p>
            </div>

            <div class="events-grid">
                <div class="event-item">
                    <img src="https://images.unsplash.com/photo-1543007630-9710e4a00a20?auto=format&fit=crop&w=200&q=80" alt="Games">
                    <p>පැණි බඹරේ</p>
                </div>
                <div class="event-item">
                    <img src="https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?auto=format&fit=crop&w=200&q=80" alt="Tug of War">
                    <p>කඹ ඇදීම</p>
                </div>
            </div>

            <div class="reg-form">
                <input type="text" id="name" placeholder="ඔබේ නම">
                <select id="class">
                    <option value="" disabled selected>පන්තිය තෝරන්න</option>
                    <option value="11-A">11-A</option>
                    <option value="11-B">11-B</option>
                    <option value="11-C">11-C</option>
                    <option value="11-D">11-D</option>
                    <option value="11-E">11-E</option>
                </select>
                <input type="tel" id="phone" placeholder="දුරකථන අංකය">
                <button class="btn" id="submitBtn" onclick="saveData()">Register Now</button>
            </div>
            
            <footer>Designed by Dhanu Editz</footer>
        </div>
    </div>

    <script>
        // 1. iOS Floating Particles
        function initParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 5 + 2 + 'px';
                p.style.width = size;
                p.style.height = size;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = Math.random() * 10 + 10 + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }
        initParticles();

        // 2. Accurate Timer
        const targetDate = new Date(2026, 3, 18, 14, 0, 0).getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff < 0) {
                document.getElementById("timer").innerHTML = "Event Started! 🌸";
                return;
            }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("timer").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        }, 1000);

        // 3. Google Sheets Save
        function saveData() {
            const name = document.getElementById('name').value;
            const uClass = document.getElementById('class').value;
            const phone = document.getElementById('phone').value;
            const btn = document.getElementById('submitBtn');

            if (!name || !uClass || !phone) {
                alert("කරුණාකර සියල්ල පුරවන්න");
                return;
            }

            btn.innerHTML = "Processing...";
            btn.disabled = true;

            const scriptURL = 'https://script.google.com/macros/s/AKfycbwf1YBxwQdU_f08CFDCio5AWIAEokAh0NLsFuuQ5SSumS9Y-ZrhePOsCz8uXjKNlwQueQ/exec';

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "name": name, "class": uClass, "phone": phone })
            })
            .then(() => {
                alert("සාර්ථකයි! අවුරුදු උත්සවයේදී හමුවෙමු.");
                document.getElementById('name').value = "";
                document.getElementById('class').value = "";
                document.getElementById('phone').value = "";
                btn.innerHTML = "Register Now";
                btn.disabled = false;
            })
            .catch(() => {
                alert('වැරදීමක් වුණා.');
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
