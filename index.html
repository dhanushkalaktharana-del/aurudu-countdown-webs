<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 11 iOS 26 Premium Invitation</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-red: #ff3b30;
            --ios-bg: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0; padding: 0; 
            background: #000;
            background-image: 
                radial-gradient(at 0% 0%, hsla(28,100%,74%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(189,100%,56%,1) 0, transparent 55%), 
                radial-gradient(at 100% 0%, hsla(355,100%,93%,1) 0, transparent 50%);
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            color: #1d1d1f; overflow-x: hidden;
            min-height: 100vh;
        }

        .particle {
            position: fixed; background: rgba(255, 255, 255, 0.5);
            border-radius: 50%; pointer-events: none; z-index: 1;
            animation: float 22s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(105vh) scale(0); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateY(-10vh) scale(1.3); opacity: 0; }
        }

        .container { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 50px 20px; position: relative; z-index: 10;
        }

        .card {
            background: var(--ios-bg); 
            backdrop-filter: blur(35px) saturate(210%);
            -webkit-backdrop-filter: blur(35px) saturate(210%);
            padding: 40px 25px; border-radius: 42px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.2); 
            text-align: center; max-width: 450px; width: 100%;
            border: 1px solid rgba(255,255,255,0.5);
            animation: iosReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes iosReveal {
            from { opacity: 0; transform: scale(0.9) translateY(40px); filter: blur(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        h1 { font-weight: 800; font-size: 2.2rem; letter-spacing: -1px; margin-bottom: 5px; color: #1d1d1f; }

        #timer { 
            background: rgba(255, 59, 48, 0.1);
            padding: 15px; border-radius: 20px; 
            font-weight: 700; font-size: 1.4rem; margin: 20px 0;
            color: var(--ios-red); border: 1px solid rgba(255, 59, 48, 0.15);
        }

        .event-details { 
            background: rgba(255, 255, 255, 0.5); padding: 20px; 
            border-radius: 25px; margin: 20px 0; text-align: left;
            font-size: 0.95rem; border: 1px solid rgba(0,0,0,0.05);
        }

        .events-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px;
        }
        .event-item {
            background: rgba(255, 255, 255, 0.7); padding: 8px; border-radius: 22px; 
            transition: 0.4s ease; border: 1px solid rgba(255,255,255,0.6);
        }
        .event-item:hover { transform: translateY(-5px); background: white; }
        .event-item img { width: 100%; border-radius: 18px; height: 100px; object-fit: cover; }
        .event-item p { font-weight: 700; margin: 10px 0 5px 0; font-size: 0.9rem; }

        .reg-form input, .reg-form select { 
            width: 100%; padding: 15px; margin: 8px 0; 
            border-radius: 18px; border: none; 
            background: rgba(0, 0, 0, 0.05); box-sizing: border-box;
            font-size: 1rem; outline: none;
        }
        
        .btn { 
            background: var(--ios-blue); color: white; padding: 18px; border-radius: 20px; 
            font-weight: 700; border: none; cursor: pointer; width: 100%; 
            font-size: 1.1rem; margin-top: 15px; box-shadow: 0 10px 20px rgba(0,122,255,0.3);
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); }

        footer { margin-top: 25px; font-size: 0.8rem; color: rgba(0,0,0,0.4); font-weight: 600; }
    </style>
</head>
<body>

    <div id="particles"></div>

    <div class="container">
        <div class="card">
            <lottie-player src="https://lottie.host/80775f0a-85d7-41a4-9988-8255474775e5/Vw3O1189p9.json"  
                background="transparent" speed="0.8" style="width: 120px; height: 120px; margin: 0 auto;" loop autoplay>
            </lottie-player>

            <h1>සූරිය මංගල්‍යය</h1>
            <p style="color: #6e6e73; font-weight: 600; margin-top: -5px;">Grade 11 Annual Festival</p>

            <div id="timer">Loading...</div>
            
            <div class="event-details">
                <p>📅 <strong>දිනය:</strong> 2026 අප්‍රේල් 18</p>
                <p>⏰ <strong>වේලාව:</strong> ප.ව. 2:00 සිට</p>
                <p>📍 <strong>ස්ථානය:</strong> පාසල් ක්‍රීඩාංගණය</p>
            </div>

            <div class="events-grid">
                <div class="event-item">
                    <img src="https://images.unsplash.com/photo-1543007630-9710e4a00a20?auto=format&fit=crop&w=300&q=80" alt="Games">
                    <p>පැණි බඹරේ</p>
                </div>
                <div class="event-item">
                    <img src="https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?auto=format&fit=crop&w=300&q=80" alt="Tug of War">
                    <p>කඹ ඇදීම</p>
                </div>
            </div>

            <div class="reg-form">
                <input type="text" id="name" placeholder="ඔබේ නම">
                <select id="class">
                    <option value="" disabled selected>පන්තිය තෝරන්න</option>
                    <option value="11-A">11-A</option>
                    <option value="11-B">11-B</option>
                    <option value="11-C">11-C</option>
                    <option value="11-D">11-D</option>
                    <option value="11-E">11-E</option>
                </select>
                <input type="tel" id="phone" placeholder="දුරකථන අංකය">
                <button class="btn" id="submitBtn" onclick="saveData()">Register Now</button>
            </div>
            
            <footer>Designed by Dhanu Editz</footer>
        </div>
    </div>

    <script>
        // Particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = Math.random() * 6 + 2 + 'px';
            p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = Math.random() * 10 + 15 + 's';
            container.appendChild(p);
        }

        // Timer
        const targetDate = new Date(2026, 3, 18, 14, 0, 0).getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff < 0) { document.getElementById("timer").innerHTML = "Event Started!"; return; }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("timer").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        }, 1000);

        // Save Data
        function saveData() {
            const name = document.getElementById('name').value;
            const uClass = document.getElementById('class').value;
            const phone = document.getElementById('phone').value;
            const btn = document.getElementById('submitBtn');

            if (!name || !uClass || !phone) { alert("Please fill all details!"); return; }

            btn.innerHTML = "Processing...";
            btn.disabled = true;

            const scriptURL = 'https://script.google.com/macros/s/AKfycbxfv5dZ9LUZrxdnWEUG5G6hM2s6l7DrsDRjUcaIMFd-zhRXSJNxGdYN6z3pp4Gr84lXRg/exec';

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "name": name, "class": uClass, "phone": phone })
            })
            .then(() => {
                alert("Success! See you at the festival.");
                document.getElementById('name').value = "";
                document.getElementById('class').value = "";
                document.getElementById('phone').value = "";
                btn.innerHTML = "Register Now";
                btn.disabled = false;
            })
            .catch(() => {
                alert('Error submitting data.');
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
