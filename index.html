<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 11 iOS 26 Premium Edition</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@1.5.7/dist/lottie-player.js"></script>
    
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-red: #ff3b30;
            --glass-bg: rgba(255, 255, 255, 0.5); 
            --glass-border: rgba(255, 255, 255, 0.7);
            --mirror: blur(40px) saturate(210%);
        }

        body {
            margin: 0; padding: 0; background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            color: #1d1d1f; overflow-x: hidden; min-height: 100vh;
        }

        /* --- 1. කැවුම් කොකිස් වැස්ස (Falling Background Rain) --- */
        .falling-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; pointer-events: none;
        }
        .falling-item {
            position: absolute; color: rgba(255, 255, 255, 0.7);
            animation: fall infinite linear; font-size: 25px;
        }
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* iOS 26 Deep Mesh Gradient Background */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3;
            background: 
                radial-gradient(at 0% 0%, #ff5e62 0, transparent 45%), 
                radial-gradient(at 50% 0%, #4facfe 0, transparent 50%), 
                radial-gradient(at 100% 0%, #ee9ca7 0, transparent 45%),
                radial-gradient(at 80% 90%, #a18cd1 0, transparent 50%),
                radial-gradient(at 20% 80%, #fbc2eb 0, transparent 50%);
            filter: blur(50px) brightness(1.1);
        }

        /* Dynamic Island */
        .dynamic-island-container {
            position: fixed; top: 18px; left: 50%;
            transform: translateX(-50%); z-index: 1000;
            display: flex; justify-content: center; width: 100%;
        }
        .dynamic-island {
            background: #000; color: white; padding: 12px 24px;
            border-radius: 30px; min-width: 140px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .island-dot { width: 8px; height: 8px; background: #ff3b30; border-radius: 50%; margin-right: 12px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .container { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 110px 20px 50px; position: relative; z-index: 10;
        }

        /* The ULTRA MIRROR CARD */
        .card {
            background: var(--glass-bg);
            backdrop-filter: var(--mirror);
            -webkit-backdrop-filter: var(--mirror);
            padding: 50px 35px; border-radius: 50px;
            box-shadow: 
                0 40px 100px rgba(0,0,0,0.1), 
                inset 0 0 30px rgba(255,255,255,0.4); /* Glass shine */
            text-align: center; max-width: 480px; width: 100%;
            border: 1.5px solid var(--glass-border);
            animation: iosReveal 1.8s cubic-bezier(0.16, 1, 0.3, 1);
            box-sizing: border-box; overflow: hidden;
        }

        @keyframes iosReveal {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- 2. ඇනිමේටඩ් මල සහ ඩෙමෝ වීඩියෝව (Animated Icon with Demo Video fallback) --- */
        .icon-box {
            width: 150px; height: 150px; margin: 0 auto;
            position: relative; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center;
        }
        .premium-icon {
            font-size: 85px; display: block;
            animation: bounce 2.5s infinite ease-in-out;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        h1 { 
            font-weight: 800; font-size: 2.7rem; letter-spacing: -1.5px; margin: 0;
            background: linear-gradient(180deg, #000 0%, #444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #timer { 
            background: rgba(255, 255, 255, 0.3);
            padding: 22px; border-radius: 28px; 
            font-weight: 800; font-size: 1.7rem; margin: 25px 0;
            color: #000; border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
        }

        .event-details { 
            background: rgba(255, 255, 255, 0.3); padding: 25px; 
            border-radius: 35px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.4);
            text-align: left;
        }

        .events-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .event-item {
            background: rgba(255, 255, 255, 0.5); padding: 10px; border-radius: 26px; 
            border: 1px solid rgba(255,255,255,0.6); transition: 0.4s;
        }
        .event-item img { width: 100%; border-radius: 20px; height: 100px; object-fit: cover; }

        .reg-form input, .reg-form select { 
            width: 100%; padding: 20px; margin: 12px 0; 
            border-radius: 24px; border: 1.5px solid rgba(255,255,255,0.5); 
            background: rgba(255, 255, 255, 0.4); box-sizing: border-box;
            font-size: 1.05rem; outline: none; transition: 0.3s;
        }
        
        .btn { 
            background: #000; color: #fff; padding: 22px; border-radius: 24px; 
            font-weight: 700; border: none; cursor: pointer; width: 100%; 
            font-size: 1.2rem; margin-top: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .btn:hover { background: #333; transform: translateY(-5px); box-shadow: 0 25px 50px rgba(0,0,0,0.3); }

        footer { margin-top: 40px; font-size: 0.9rem; color: rgba(0,0,0,0.4); font-weight: 600; }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>
    
    <div class="falling-container" id="falling-items"></div>

    <div class="dynamic-island-container">
        <div class="dynamic-island">
            <div class="island-content">
                <div class="island-dot"></div>
                <span id="island-text" style="font-size: 0.8rem; font-weight: 600;">Suriya Mangalyaya</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            
            <div class="icon-box">
                <lottie-player src="https://assets2.lottiefiles.com/packages/lf20_at6m9p8b.json"  
                    background="transparent" speed="1.2" loop autoplay 
                    style="width: 100%; height: 100%; position: absolute;" 
                    onerror="this.style.display='none'; document.getElementById('alt-flower').style.display='block';">
                </lottie-player>
                <div id="alt-flower" class="premium-icon" style="display:none; position: absolute;">🌸</div>
            </div>

            <h1>සූරිය මංගල්‍යය</h1>
            <p style="color: #444; font-weight: 700; font-size: 1.1rem; margin-top: -5px;">Grade 11 Annual Festival</p>

            <div id="timer">00d 00h 00m 00s</div>
            
            <div class="event-details">
                <p>📅 <strong>දිනය:</strong> 2026 අප්‍රේල් 18</p>
                <p>⏰ <strong>වේලාව:</strong> ප.ව. 2:00 සිට</p>
                <p>📍 <strong>ස්ථානය:</strong> පාසල් ක්‍රීඩාංගණය</p>
            </div>

            <div class="events-grid">
                <div class="event-item">
                    <img src="https://www.lanka.com/wp-content/uploads/2014/04/avurudu-games-1.jpg" alt="Games">
                    <p style="font-weight: 700; font-size: 0.9rem; margin-top: 5px;">පැණි බඹරේ</p>
                </div>
                <div class="event-item">
                    <img src="https://i0.wp.com/island.lk/wp-content/uploads/2021/04/tug-of-war.jpg" alt="Tug of War">
                    <p style="font-weight: 700; font-size: 0.9rem; margin-top: 5px;">කඹ ඇදීම</p>
                </div>
            </div>

            <div class="reg-form">
                <input type="text" id="name" placeholder="ඔබේ නම">
                <select id="class">
                    <option value="" disabled selected>පන්තිය තෝරන්න</option>
                    <option>11-A</option><option>11-B</option><option>11-C</option><option>11-D</option>
                </select>
                <input type="tel" id="phone" placeholder="දුරකථන අංකය">
                <button class="btn" id="submitBtn" onclick="saveData()">Register Now</button>
            </div>
            
            <footer>Designed by Dhanushka Laktharana | Dhanu Editz</footer>
        </div>
    </div>

    <script>
        // --- 1. කැවුම් කොකිස් වැස්ස ක්‍රියාත්මක කිරීම (Create Kavili Rain) ---
        function createFallingItems() {
            const container = document.getElementById('falling-items');
            // කැවුම්, කොකිස් සහ මල්වල අයිකන් (Icons)
            const kaviliOptions = ['🌸', '✨', '🍪', '🥥', '🎊'];
            
            for (let i = 0; i < 35; i++) {
                const item = document.createElement('div');
                item.className = 'falling-item';
                // අයිකන් එකක් අහඹු ලෙස තෝරාගැනීම
                item.innerHTML = kaviliOptions[Math.floor(Math.random() * kaviliOptions.length)];
                
                // අහඹු වේගයන් සහ ස්ථාන
                item.style.left = Math.random() * 100 + 'vw';
                item.style.animationDuration = (Math.random() * 8 + 5) + 's'; // 5s to 13s
                item.style.animationDelay = Math.random() * 8 + 's';
                item.style.fontSize = (Math.random() * 15 + 15) + 'px'; // 15px to 30px
                
                container.appendChild(item);
            }
        }
        createFallingItems();

        // Timer Logic
        const targetDate = new Date(2026, 3, 18, 14, 0, 0).getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff < 0) {
                document.getElementById("timer").innerHTML = "Event Started! 🌸";
                return;
            }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            const res = `${d}d ${h}h ${m}m ${s}s`;
            document.getElementById("timer").innerHTML = res;
            document.getElementById("island-text").innerHTML = "Ends in: " + res;
        }, 1000);

        function saveData() {
            const name = document.getElementById('name').value;
            const uClass = document.getElementById('class').value;
            const phone = document.getElementById('phone').value;
            const btn = document.getElementById('submitBtn');
            if (!name || !uClass || !phone) { alert("Please fill all details!"); return; }
            btn.innerHTML = "Processing..."; btn.disabled = true;
            const scriptURL = 'https://script.google.com/macros/s/AKfycbxfv5dZ9LUZrxdnWEUG5G6hM2s6l7DrsDRjUcaIMFd-zhRXSJNxGdYN6z3pp4Gr84lXRg/exec';
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ "name": name, "class": uClass, "phone": phone }) })
            .then(() => {
                alert("සාර්ථකයි! අවුරුදු උත්සවයේදී හමුවෙමු.");
                document.getElementById('name').value = ""; document.getElementById('class').value = ""; document.getElementById('phone').value = "";
                btn.innerHTML = "Register Now"; btn.disabled = false;
            })
            .catch(() => { alert('Error submissions data.'); btn.disabled = false; });
        }
    </script>
</body>
</html>
